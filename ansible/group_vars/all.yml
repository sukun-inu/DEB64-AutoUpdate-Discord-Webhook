# ============================================================
# クラスター共通設定
# ============================================================

# Discord Webhook URL（必須）
webhook_url: "YOUR_DISCORD_WEBHOOK_URL"

# APT メンテナンスを実行する時刻（タイマー）
maintenance_time: "02:30"

# カーネル更新が検知された翌朝に再起動する時刻
reboot_time: "03:00"

# タイムゾーン
timezone: "Asia/Tokyo"
